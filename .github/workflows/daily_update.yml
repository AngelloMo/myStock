name: Daily Stock Data Update

on:
  schedule:
    # Runs at 00:00 UTC every day (approximately after US market closes)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml html5lib

      - name: Run data generation script
        run: python generate_stock_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock.json
          git commit -m "chore: auto-update stock data for $(date +'%Y-%m-%d')" || exit 0
          git push
