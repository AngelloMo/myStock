<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나스닥 100 주가 분석</title>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/stock/modules/data.js"></script>
    <script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/stock/modules/accessibility.js"></script>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <h1>나스닥 100 주가 분석 (NASDAQ 100 Analysis)</h1>

    <!-- 버블 차트 섹션 -->
    <div id="bubble-section">
        <h2 style="text-align: center;">나스닥 100 종목 현황 (등락률 vs 거래량)</h2>
        <div class="bubble-controls" style="text-align: center; margin-bottom: 10px;">
            <button id="play-bubble">재생 (Play)</button>
            <span id="current-bubble-date" style="margin-left: 15px; font-weight: bold; font-size: 1.2em;"></span>
        </div>
        <div id="bubble-container" style="height: 500px; margin-bottom: 30px;"></div>
    </div>

    <div class="controls">
        <label for="stock-select">종목 선택:</label>
        <input type="text" id="stock-search" placeholder="종목명 또는 티커 검색..." style="margin-right: 10px;">
        <select id="stock-select"></select>

        <label>차트 종류:</label>
        <button id="timeframe-daily" class="active">일봉</button>
        <button id="timeframe-weekly">주봉</button>
        <button id="timeframe-monthly">월봉</button>

        <label style="margin-left: 20px;">조회 기간:</label>
        <input type="date" id="start-date">
        <span>~</span>
        <input type="date" id="end-date">
    </div>
    <div id="recommendation">
        <h2>선택된 종목: <span id="stock-name"></span></h2>
        <p>티커: <span id="stock-code"></span></p>
    </div>
    <div id="container"></div>
    <script src="main.js"></script>
</body>
</html>
