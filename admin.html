<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 통계 - 미국 증시 분석 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container, .stats-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stats-container { display: none; max-width: 600px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { padding: 20px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .stat-value { font-size: 2em; font-weight: bold; color: #1877f2; margin-top: 10px; }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <h1 onclick="location.href='index.html'" style="cursor:pointer">미국 증시 분석 대시보드</h1>
    </header>

    <div id="login-section" class="login-container">
        <h2>관리자 로그인</h2>
        <div class="input-group">
            <label>아이디</label>
            <input type="text" id="admin-id" placeholder="ID">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="admin-pw" placeholder="Password">
        </div>
        <button class="login-btn" onclick="checkLogin()">로그인</button>
        <p id="login-error" style="color: red; margin-top: 10px; display: none;">아이디 또는 비밀번호가 틀렸습니다.</p>
    </div>

    <div id="stats-section" class="stats-container">
        <h2>방문자 통계</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div>일간 조회수 (Daily Views)</div>
                <div class="stat-value" id="daily-views">1,245</div>
            </div>
            <div class="stat-card">
                <div>전체 조회수 (Total Views)</div>
                <div class="stat-value" id="total-views">45,892</div>
            </div>
        </div>
        <div style="margin-top: 30px;">
            <p style="font-size: 0.9em; color: #666;">* 본 데이터는 Counter API를 통해 실시간으로 집계되는 실제 방문자 수입니다.</p>
            <button class="login-btn" style="background: #666; margin-top: 10px;" onclick="location.href='index.html'">메인으로 돌아가기</button>
        </div>
    </div>

    <script src="counter.js"></script>
    <script>
        async function checkLogin() {
            const id = document.getElementById('admin-id').value;
            const pw = document.getElementById('admin-pw').value;
            
            // 사용자가 요청한 고정 패스워드
            if (id === 'admin' && pw === 'system04!!') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('stats-section').style.display = 'block';
                
                // Real data from Counter API
                const stats = await getVisitStats();
                document.getElementById('daily-views').textContent = stats.daily.toLocaleString();
                document.getElementById('total-views').textContent = stats.total.toLocaleString();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
