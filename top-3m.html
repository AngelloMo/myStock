<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최근 3개월 수익률 Top 10 - 미국 증시 분석 대시보드</title>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/stock/modules/data.js"></script>
    <script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/stock/modules/accessibility.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard-header">
        <select id="dashboard-select">
            <option value="NASDAQ100">나스닥 100 (NASDAQ 100)</option>
            <option value="SP500">S&P 500 (Standard & Poor's)</option>
            <option value="SP500_EX_NDX">S&P 500 (나스닥 100 제외)</option>
        </select>
        <h1 id="dashboard-title">최근 3개월 수익률 Top 10</h1>
    </header>

    <main>
        <div class="tabs" style="display:none;">
            <button class="tab-link active" onclick="openTab(event, 'bubble-tab')">버블차트</button>
            <button class="tab-link" onclick="openTab(event, 'analysis-tab')">종목분석</button>
        </div>

        <div id="bubble-tab" class="tab-content active">
            <div id="bubble-section">
                <div class="bubble-controls">
                    <div class="control-group">
                        <label>기준일:</label>
                        <input type="date" id="bubble-start-date">
                    </div>
                    <div class="control-group">
                        <button id="play-bubble">재생</button>
                        <span id="current-bubble-date"></span>
                    </div>
                    <div class="control-group">
                        <label>필터:</label>
                        <select id="bubble-filter">
                            <option value="mcap-up-3m" selected>오늘자 기준 최근 3개월 상승률 Top 10</option>
                            <option value="all">전체 종목</option>
                            <option value="mcap-up-1w">기준일 이전 1주 상승률 Top 10</option>
                            <option value="mcap-up-2w">기준일 이전 2주 상승률 Top 10</option>
                            <option value="mcap-up-1m">기준일 이전 1달 상승률 Top 10</option>
                            <option value="mcap-up-2m">기준일 이전 2개월 상승률 Top 10</option>
                        </select>
                    </div>
                    <!-- Hidden elements needed by main.js -->
                    <div style="display:none;">
                        <select id="speed-control"><option value="1" selected>1x</option></select>
                        <div id="sector-checkboxes"><input type="checkbox" value="all" checked></div>
                        <span id="selected-sectors-text"></span>
                        <input type="range" id="date-slider">
                        <input type="text" id="stock-search">
                        <select id="stock-select"></select>
                        <input type="date" id="start-date">
                        <input type="date" id="end-date">
                    </div>
                </div>
                <div id="bubble-container" class="chart-container"></div>
            </div>
        </div>

        <!-- Hidden analysis tab content for main.js compatibility -->
        <div id="analysis-tab" class="tab-content" style="display:none;">
            <div id="container"></div>
        </div>
    </main>

    <footer class="dashboard-footer" style="padding: 20px; background: #333; color: #fff; text-align: center; margin-top: 40px;">
        <div class="footer-links">
            <a href="index.html" style="color: #fff; margin: 0 10px; text-decoration: none;">홈으로</a> |
            <a href="top-2w.html" style="color: #fff; margin: 0 10px; text-decoration: none;">2주 Top 10</a> |
            <a href="top-1m.html" style="color: #fff; margin: 0 10px; text-decoration: none;">1달 Top 10</a> |
            <a href="top-2m.html" style="color: #fff; margin: 0 10px; text-decoration: none;">2달 Top 10</a> |
            <a href="top-3m.html" style="color: #fff; margin: 0 10px; text-decoration: none; font-weight: bold;">3달 Top 10</a>
        </div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
